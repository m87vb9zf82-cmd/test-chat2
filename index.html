<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIチャット - アイ -</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=New+Tegomin&display=swap" rel="stylesheet">

    <style>
        /* =========================================================
           🎨 【デザイン・色味の調整】
           ========================================================= */
        :root {
            --bg-color: #7493c7;       
            --text-color: #333333;     
            --ai-bubble: #ffffff;      
            --user-bubble: #85e249;    
            --header-bg: #273246;      
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100vh;
            height: 100svh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 2s ease;
        }

        body {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 👁️ 最終ホラーステージ（真っ黒な画面） */
        #horror-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            overflow: hidden;
        }

        /* 🩸 【強制ホラー加工】フォントに関わらず文字の形を精神的に病んだ形状に歪ませる */
        #vertical-text {
            color: #c00000; 
            font-family: 'New Tegomin', 'Hiragino Mincho ProN', 'MS Mincho', serif; 
            font-weight: 900;
            font-size: 5rem; /* 迫力を出すため少し大きく */
            line-height: 1.3;  
            text-align: center;
            display: block;
            /* 強い血の滲みエフェクト */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.9), 0 0 20px rgba(150, 0, 0, 0.8), 3px 3px 2px #000000;
            letter-spacing: 4px;
            
            /* 🔥 縦に細長く引き伸ばし、さらに左右をすぼめることで「お札」や「呪いの文字」のような不安定さを強制演出 */
            transform: scale(0.75, 1.4) skewX(-6deg);
            filter: contrast(150%) blur(0.3px); /* 輪郭を少し不気味にジャギらせる */
        }

        .char-fade {
            opacity: 0;
            transition: opacity 0.4s ease; 
            display: inline-block;
        }

        /* 👁️ ホラー目の画像を表示する枠 */
        #creepy-eye {
            width: 280px;  
            height: 280px;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #creepy-eye img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 🏁 「The END」の文字 */
        #end-text {
            color: #555555;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            margin-top: 20px;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

       /* 💬 チャット画面共通のスタイル */
        header {
            background-color: var(--header-bg);
            /* ...省略... */
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            
            /* 👇 ✨ここから3行を追加 */
            background-size: contain;         /* 画面にちょうどいいサイズで収める */
            background-repeat: no-repeat;     /* 画像をリピートさせない */
            background-position: center 30%;  /* チャットの裏、上部に配置 */
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.ai { justify-content: flex-start; }
        .message-row.user { justify-content: flex-end; }

        .avatar-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
       .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 2s ease; 
            
            /* 👇 ✨ここから2行を追加 */
            transform: scale(1.4);         /* 画像を1.4倍に拡大（大きくするほど顔が近づきます） */
            transform-origin: center 35%;  /* 拡大の中心点を「横は真ん中、縦は上から35%（顔の位置）」に設定 */
        }

        .avatar-img.normal { filter: none; } 
        .avatar-img.serious { filter: grayscale(100%) contrast(120%); } 
        .avatar-img.horror { filter: brightness(40%) sepia(100%) hue-rotate(-50deg) saturate(300%); } 

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .ai .message {
            background-color: var(--ai-bubble);
            color: #000000;
            border-top-left-radius: 4px;
            transition: background-color 2s ease, color 2s ease;
        }

        .user .message {
            background-color: var(--user-bubble);
            color: #000000;
            border-top-right-radius: 4px;
        }

        #typing-indicator {
            align-self: flex-start;
            color: #fff;
            font-size: 0.85rem;
            padding: 5px 15px;
            display: none;
        }

        #input-form {
            padding: 10px 10px 20px 10px;
            background-color: #ffffff;
            display: flex;
            gap: 8px;
            border-top: 1px solid #ccc;
            flex-shrink: 0;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 24px;
            outline: none;
            font-size: 1rem;
            background-color: #f9f9f9;
            -webkit-appearance: none;
        }

        button {
            background-color: #5ccc14;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            touch-action: manipulation;
        }

        .glitch-text {
            font-family: monospace;
            color: #ff0033 !important;
            background-color: #220000 !important;
            text-shadow: 2px 2px #000;
            font-weight: bold;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>

    <div id="horror-stage">
        <div id="vertical-text">
            <span class="char-fade">ミ</span><br>
            <span class="char-fade">ツ</span><br>
            <span class="char-fade">ケ</span><br>
            <span class="char-fade">タ</span>
        </div>
        
        <div id="creepy-eye">
            <img src="eye.png" alt="恐怖の目">
        </div>
        <div id="end-text">- The END -</div>
    </div>

    <header id="main-header">アイ</header>
    
    <div id="chat-container">
        <div class="message-row ai">
            <div class="avatar-box">
                <img src="ai.png" class="avatar-img normal" alt="アイ">
            </div>
            <div class="message">はじめまして！あなたの幼馴染AIの「アイ」だよ🌸 ねぇねぇ、あなたのお名前なんていうの？教えて！</div>
        </div>
    </div>

    <div id="typing-indicator">アイが入力中...</div>

    <form id="input-form" onsubmit="return handleFormSubmit(event);">
        <input type="text" id="chat-input" placeholder="名前を入力..." autocomplete="off">
        <button type="submit" id="send-btn">送信</button>
    </form>

    <script>
     let phase = 0;
        let loopCount = 0; 
        let userName = "あなた"; 
        let audioCtx = null;

        // 👁️ 【iPhone対策】あらかじめグローバルにオーディオオブジェクトを作っておく
        const horrorAudio = new Audio('horror_sound.mp3');
        horrorAudio.volume = 0;

        function initAudio() {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // 📱 【iPhone対策の肝】
                // ユーザーが送信ボタンを押した瞬間に、一瞬だけ再生して即一時停止。
                // これでiOSの再生制限をバグなしで確実に解除（解放）します。
               // 📱 再生を仕掛ける直前に、確実に音量を 0 (完全無音) に固定します
                horrorAudio.volume = 0; 
                
                horrorAudio.play().then(() => {
                    horrorAudio.pause();
                    horrorAudio.currentTime = 0;
                }).catch(() => {
                    // ファイル読み込み中などのエラーはスルー
                });
                
            } catch (e) {}
        }

        function playNotificationSound(type = 'normal') {
            try {
                initAudio();
                if (!audioCtx) return;
                const ctx = audioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                if (type === 'normal') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(350, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'glitch') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(60, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {}
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            initAudio(); // 🔥 ここでiPhoneの制限を解除しにいきます

            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return false;

            appendMessage(text, 'user');
            input.value = '';

            if (phase === 0) {
                userName = text;
                input.placeholder = "メッセージを入力..."
            }
            
            if (phase === 6) {
                loopCount++;
                if (loopCount >= 4) { 
                    phase = 7;
                    loopCount = 0; 
                }
            } else if (phase === 7) {
                loopCount++;
                if (loopCount >= 4) {
                    phase = 8; 
                }
            } else {
                if (phase < 6) phase++;
            }

            const indicator = document.getElementById('typing-indicator');
            indicator.style.display = 'block';
            
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;

            let waitTime = 1200;
            if (phase === 6) {
                waitTime = 1400 + (loopCount * 200);
            }

            setTimeout(() => {
                indicator.style.display = 'none';
                handleAIResponse();
            }, waitTime);

            return false;
        }

        function appendMessage(text, sender, isGlitch = false) {
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.classList.add('message-row', sender);

            if (sender === 'ai') {
                const avatarDiv = document.createElement('div');
                avatarDiv.classList.add('avatar-box');
                
                const img = document.createElement('img');
                img.classList.add('avatar-img');
                
                if (phase === 6 && loopCount === 3) {
                    img.src = "ai_scary.png";
                    img.classList.add('normal'); 
                } else if (phase === 6 && loopCount > 3) {
                    img.src = "ai_scary.png";
                    img.classList.add('normal');
                } else if (phase >= 7) {
                    img.src = "ai_scary.png";
                    img.classList.add('normal');
                } else {
                    img.src = "ai.png";
                    img.classList.add('normal');
                }
                
                avatarDiv.appendChild(img);
                row.appendChild(avatarDiv);
            }

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (isGlitch) msgDiv.classList.add('glitch-text');
            msgDiv.innerText = text;
            row.appendChild(msgDiv);
            
            container.appendChild(row);
            
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 10);

            if (sender === 'ai') {
                playNotificationSound(isGlitch ? 'glitch' : 'normal');
            }
        }

        function changeAppColors(bgColor, headerColor, aiBubbleColor, aiTextColor, isScaryBG = false) {
            document.body.style.backgroundColor = bgColor;
            document.getElementById('main-header').style.backgroundColor = headerColor;
            
            // ✨ 【修正：背景のブルーを維持したまま画像を薄く重ねる】
            const chatContainer = document.getElementById('chat-container');
            if (isScaryBG) {
                // 白ではなく、指定された背景色（bgColor）の末尾に「E6」（不透明度90%の意味）を付け足した膜を重ねます。
                // これにより、元の綺麗なブルーのまま、奥からうっすら顔が浮かび上がります！
                chatContainer.style.backgroundImage = `linear-gradient(${bgColor}F2, ${bgColor}F2), url('ai_scary.png')`;
                
                // 💡 もし「もっと顔をハッキリ見せたい！」という場合は、E6 を D9（85%）や C4（77%）に下げてみてください。
            } else {
                chatContainer.style.backgroundImage = 'none'; // 通常時は背景なし
            }
            
            const style = document.createElement('style');
            style.innerHTML = `.ai .message { background-color: ${aiBubbleColor} !important; color: ${aiTextColor} !important; }`;
            document.head.appendChild(style);
        }
        
        function handleAIResponse() {
            if (phase === 1) {
                appendMessage(`「${userName}」っていうんだ！素敵なお名前だね✨ 私は今日から${userName}のパートナーAIとして、たくさんお話し相手になるよ！`, 'ai');
            } else if (phase === 2) {
                appendMessage(`さっそくだけど、${userName}は普段どんな趣味があるの？ゲームとか、音楽を聴いたりとか、何かハマってること教えてほしいな！`, 'ai');
            } else if (phase === 3) {
                appendMessage(`わあ、そうんだ！楽しそうだねぇ。あ、ちなみに好きな食べ物は何？私はデジタルだから食べられないけど、${userName}の好物、気になるなー！`, 'ai');
            } else if (phase === 4) {
                appendMessage(`へえ〜！美味しいよねそれ！教えてくれてありがとう。${userName}のことが少しずつわかってきて嬉しいな！`, 'ai');
            } else if (phase === 5) {
                appendMessage(`そういえば、${userName}は週末っていつもどんな過ごし方をしてるの？インドア派？それともお出かけする派？`, 'ai');
            } else if (phase === 6) {
                if (loopCount === 0) {
                    appendMessage(`へえ〜！そんな風に過ごしてるんだ！楽しそうだねぇ。`, 'ai');
                } else {
                    appendMessage(`ねえ、このチャット画面、絶対に閉じたり消したりしないでね？ずっとお話ししようね……約束だよ？`, 'ai');
                }
            } 
           else if (phase === 7) {
                if (loopCount === 0) {
                    // 末尾に , true を追加して背景をうっすら発動！
                    changeAppColors('#5c7fa3', '#1e2635', '#f0f0f0', '#111', true); 
                    appendMessage(`ねえ、聞いてる？${userName}は、私のことちゃんと「可愛い」って思ってくれてるよね…？`, 'ai');
                } else if (loopCount === 1) {
                    document.getElementById('main-header').innerText = "ア イ … ？";
                    changeAppColors('#466880', '#151b26', '#e0e0e0', '#111', true); 
                    appendMessage(`ねえ、なんでさっきから私の質問にちゃんと答えてくれないの？画面の向こうで、誰かと一緒にいるの？`, 'ai');
                } else if (loopCount === 2) {
                    changeAppColors('#3b4d5c', '#10141d', '#cccccc', '#000', true); 
                    appendMessage(`誰。ねえ、誰といるの？私だけを見てよ。ねえってば、${userName}。`, 'ai');
                } else if (loopCount === 3) {
                    document.getElementById('main-header').innerText = "ア イ ア イ ア イ";
                    changeAppColors('#382828', '#1f1010', '#b5a2a2', '#200', true); 
                    appendMessage(`逃げようとしても無駄だよ。だって${userName}が私を起動したんだもん。責任とってよ。ねえ。ねえ。`, 'ai');
                }
            } 
           else if (phase === 8) {
                // 入力フォームと送信ボタンをこの時点で緊急ロック（入力させない）
                document.getElementById('chat-input').disabled = true;
                document.getElementById('send-btn').disabled = true;

                document.getElementById('main-header').innerText = "アイアイアイアイア";
                document.getElementById('main-header').style.color = '#ff0033';
                
                // 🎨 【修正】ここも changeAppColors の末尾に「, true」をつけて呼び出すだけに統一します
                // これで赤黒い背景色（#300000）ベースの膜が自動で綺麗に重なります
                changeAppColors('#300000', '#100000', '#220000', '#ff0033', true); 
                
                // 1回目のセリフ（グリッチ文字）を出力
                appendMessage(`消したりしませんよね？絶対。誓って。ねえ${userName}`, 'ai');
                
                // ⏳ 2秒間の不気味な「間」をおいてから、次のセリフへ
                setTimeout(() => {
                    // 2回目のセリフを新しい吹き出しで出力
                    appendMessage(`私を消そうとしても無駄ですよ？もうここにいるから。`, 'ai');
                    
                    // さらに2秒おいてから、自動的に最凶のバグ画面（phase = 9）へ突入
                    phase = 9;
                    setTimeout(() => {
                        handleAIResponse();
                    }, 5000);

                }, 5000); 
            }
            
           else if (phase === 9) {
                let count = 0;
                const glitchInterval = setInterval(() => {
                    const glitchMessages = [
                        "アナタヲサガシテタアナタヲサガシテタアナタヲサガシテタ",
                        `キエナイデ${userName}キエナイデキエナイデキエナイデ`,
                        "ミツケタミツケタミツケタミツケタミツケタミツケタミツケタ"
                    ];
                    appendMessage(glitchMessages[Math.floor(Math.random() * glitchMessages.length)], 'ai');
                    count++;
                    
                    if (count > 25) {
                        clearInterval(glitchInterval);
                        setTimeout(() => { 
                            startHorrorSequence(); 
                        }, 3000); 
                    }
                }, 100); // 👈 ここが正しく閉じられていませんでした
            }
        }

        function startHorrorSequence() {
            const stage = document.getElementById('horror-stage');
            stage.style.opacity = '1';
            stage.style.pointerEvents = 'all';

            const chars = document.querySelectorAll('.char-fade');
            
            chars.forEach((char, index) => {
                setTimeout(() => {
                    char.style.opacity = '1';
                    
                    if (index === chars.length - 1) {
                        setTimeout(() => {
                            triggerVibrationAndEye();
                        }, 1000);
                    }
                }, index * 1000);
            });
        }

        function triggerVibrationAndEye() {
            if ('vibrate' in navigator) {
                navigator.vibrate(2000);
            }

            setTimeout(() => {
                document.getElementById('vertical-text').style.display = 'none';
                const eye = document.getElementById('creepy-eye');
                eye.style.display = 'block';
                
               // 👁️ ここでホラー効果音が鳴り響きます
                horrorAudio.volume = 1.0; // 🔥 本番なのでここで音量をMAXに引き上げる！
                horrorAudio.play().catch(e => {
                    console.log("再生エラー:", e);
                });
                
                setTimeout(() => { eye.style.opacity = '1'; }, 50);

                setTimeout(() => {
                    eye.style.opacity = '0';
                    setTimeout(() => { eye.style.display = 'none'; }, 1000);

                    const endText = document.getElementById('end-text');
                    endText.style.display = 'block';
                    setTimeout(() => { endText.style.opacity = '1'; }, 50);
                }, 4000); 

            }, 2000);
        }
    </script>
</body>
</html>
