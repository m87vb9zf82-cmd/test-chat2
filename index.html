<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIチャット - アイ -</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=New+Tegomin&display=swap" rel="stylesheet">

    <style>
        /* =========================================================
           🎨 【デザイン・色味の調整】
           ========================================================= */
        :root {
            --bg-color: #7493c7;       
            --text-color: #333333;     
            --ai-bubble: #ffffff;      
            --user-bubble: #85e249;    
            --header-bg: #273246;      
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

       html, body {
    height: 100svh; /* 👈 スマホのメニュー領域を除いた、本当に使える高さ */
    width: 100vw;
    overflow: hidden;
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: background-color 2s ease;
}

        body {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 👁️ 最終ホラーステージ（真っ黒な画面） */
        #horror-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            overflow: hidden;
        }

        /* 🩸 【強制ホラー加工】 */
        #vertical-text {
            color: #c00000; 
            font-family: 'New Tegomin', 'Hiragino Mincho ProN', 'MS Mincho', serif; 
            font-weight: 900;
            font-size: 5rem;
            line-height: 1.3;  
            text-align: center;
            display: block;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.9), 0 0 20px rgba(150, 0, 0, 0.8), 3px 3px 2px #000000;
            letter-spacing: 4px;
            transform: scale(0.75, 1.4) skewX(-6deg);
            filter: contrast(150%) blur(0.3px);
        }

        .char-fade {
            opacity: 0;
            transition: opacity 0.4s ease; 
            display: inline-block;
        }

        /* 👁️ ホラー目の画像を表示する枠 */
        #creepy-eye {
            width: 280px;  
            height: 280px;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #creepy-eye img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 🏁 「The END」の文字 */
        #end-text {
            color: #555555;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            margin-top: 20px;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* ✨ 「Thanks for Playing！」の文字を追加 */
        #thanks-text {
            color: #333333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            margin-top: 15px;
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* 💬 チャット画面共通のスタイル */
        header {
            background-color: var(--header-bg);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
            background-size: 180%;         
            background-repeat: no-repeat;     
            background-position: center 10%;  
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.ai { justify-content: flex-start; }
        .message-row.user { justify-content: flex-end; }

        .avatar-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 2s ease; 
            transform: scale(1.4);         
            transform-origin: center 35%;  
        }

        .avatar-img.normal { filter: none; } 

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .ai .message {
            background-color: var(--ai-bubble);
            color: #000000;
            border-top-left-radius: 4px;
            transition: background-color 2s ease, color 2s ease;
        }

        .user .message {
            background-color: var(--user-bubble);
            color: #000000;
            border-top-right-radius: 4px;
        }

        #typing-indicator {
            align-self: flex-start;
            color: #fff;
            font-size: 0.85rem;
            padding: 5px 15px;
            display: none;
        }

       #input-form {
    /* 👇 下側の余白を40pxに広げ、さらにスマホの安全領域（env）をプラスして絶対に被らせません */
    padding: 10px 10px calc(40px + env(safe-area-inset-bottom)) 10px;
    background-color: #ffffff;
    display: flex;
    gap: 8px;
    border-top: 1px solid #ccc;
    flex-shrink: 0;
}

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 24px;
            outline: none;
            font-size: 1rem;
            background-color: #f9f9f9;
            -webkit-appearance: none;
        }

        button {
            background-color: #5ccc14;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            touch-action: manipulation;
        }

        .glitch-text {
            font-family: monospace;
            color: #ff0033 !important;
            background-color: #220000 !important;
            text-shadow: 2px 2px #000;
            font-weight: bold;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>
<!-- 📱 PCアクセス制限用のブロック画面 -->
    <div id="pc-blocker" style="
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #111111;
        color: #ffffff;
        z-index: 999999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
    ">
        <div style="font-size: 48px; margin-bottom: 20px;">📱</div>
        <h2 style="font-size: 20px; margin-bottom: 15px; font-weight: bold;">スマートフォン専用ゲームです</h2>
        <p style="font-size: 14px; color: #ccc; line-height: 1.6; margin: 0;">
            このホラーゲームは演出の都合上、<br>
            スマートフォンでのプレイにのみ対応しています。<br>
            恐れ入りますが、スマホからアクセスし直してお楽しみください。
        </p>
    </div>

    <script>
        // 🕵️‍♂️ プレイヤーの端末がPCかスマホかを判定する処理
        window.addEventListener('DOMContentLoaded', () => {
            const userAgent = navigator.userAgent.toLowerCase();
            
            // iPhone, iPad, Android などのキーワードが含まれて「いない」＝ PC と判断
            const isDataSmart = /iphone|ipad|ipod|android/.test(userAgent);
            
            if (!isDataSmart) {
                // PCだった場合は、真っ黒なブロック画面を強制表示してゲームを隠す
                document.getElementById('pc-blocker').style.display = 'flex';
            }
        });
    </script>
    
    <div id="horror-stage">
        <div id="vertical-text">
            <span class="char-fade">ミ</span><br>
            <span class="char-fade">ツ</span><br>
            <span class="char-fade">ケ</span><br>
            <span class="char-fade">タ</span>
        </div>
        
        <div id="creepy-eye">
            <img src="eye.png" alt="恐怖の目">
        </div>
        <div id="end-text">- The END -</div>
        <div id="thanks-text">Thanks for Playing！</div>
    </div>

    <header id="main-header">アイ</header>
    
    <div id="chat-container">
        <div class="message-row ai">
            <div class="avatar-box">
                <img src="ai.png" class="avatar-img normal" alt="アイ">
            </div>
            <div class="message">はじめまして！あなたの幼馴染AIの「アイ」だよ🌸 ねぇねぇ、あなたのお名前なんていうの？教えて！</div>
        </div>
    </div>

    <div id="typing-indicator">アイが入力中...</div>

    <form id="input-form" onsubmit="return handleFormSubmit(event);">
        <input type="text" id="chat-input" placeholder="名前を入力..." autocomplete="off">
        <button type="submit" id="send-btn">送信</button>
    </form>

    <script>
        let phase = 0;
        let loopCount = 0; 
        let userName = "あなた"; 
        let audioCtx = null;

        // 👁️ GitHub上の実際のファイル名「horror_sound.mp3.mp3」に合わせました
        const horrorAudio = new Audio('horror_sound.mp3');
        horrorAudio.volume = 0;

        function initAudio() {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // 🤫 volume=0 ではなく、完全にミュート（消音）状態にしてから空再生します
                horrorAudio.muted = true; 
                horrorAudio.play().then(() => {
                    horrorAudio.pause();
                    horrorAudio.currentTime = 0;
                   
                }).catch(() => {});
            } catch (e) {}
        }

        function playNotificationSound(type = 'normal') {
            try {
                initAudio();
                if (!audioCtx) return;
                const ctx = audioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                if (type === 'normal') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(350, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'glitch') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(60, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {}
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            initAudio();

            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return false;

            appendMessage(text, 'user');
            input.value = '';

            if (phase === 0) {
                userName = text;
                input.placeholder = "メッセージを入力..."
            }
            
            if (phase === 6) {
                loopCount++;
                if (loopCount >= 4) { 
                    phase = 7;
                    loopCount = 0; 
                }
            } else if (phase === 7) {
                loopCount++;
                if (loopCount >= 4) {
                    phase = 8; 
                }
            } else {
                if (phase < 6) phase++;
            }

            const indicator = document.getElementById('typing-indicator');
            indicator.style.display = 'block';
            
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;

           // ⏳ 通常の返信速度（1.2秒）
            let waitTime = 1200;
            
            // 🤖 【演出強化】フェーズ6（ループセリフ）のタイムラグを不均等にする
            if (phase === 6) {
                if (loopCount === 1) {
                    // 1回目：「絶対に閉じたり消したりしないでね？」の最初の返信
                    waitTime = 1200; // 普通の速度
                } else if (loopCount === 2) {
                    // 2回目：ちょっと遅れて「ん？」と思わせる
                    waitTime = 3000; // 2秒のタメ
                } else if (loopCount === 3) {
                    // 3回目：本気でバグったか不安になる長さ
                    waitTime = 6000; // 5秒のタメ
                } else {
                    // 4回目以降（フェーズ7に移行する前）
                    waitTime = 1500; 
                }
            }

            setTimeout(() => {
                indicator.style.display = 'none';
                handleAIResponse();
            }, waitTime);

            return false;
        }

        function appendMessage(text, sender, isGlitch = false) {
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.classList.add('message-row', sender);

            if (sender === 'ai') {
                const avatarDiv = document.createElement('div');
                avatarDiv.classList.add('avatar-box');
                
                const img = document.createElement('img');
                img.classList.add('avatar-img');
                
                if (phase === 6 && loopCount >= 3) {
                    img.src = "ai_scary.png";
                } else if (phase >= 7) {
                    img.src = "ai_scary.png";
                } else {
                    img.src = "ai.png";
                }
                img.classList.add('normal');
                
                avatarDiv.appendChild(img);
                row.appendChild(avatarDiv);
            }

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (isGlitch) msgDiv.classList.add('glitch-text');
            msgDiv.innerText = text;
            row.appendChild(msgDiv);
            
            container.appendChild(row);
            
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 10);

            if (sender === 'ai') {
                playNotificationSound(isGlitch ? 'glitch' : 'normal');
            }
        }

        function changeAppColors(bgColor, headerColor, aiBubbleColor, aiTextColor, isScaryBG = false) {
            document.body.style.backgroundColor = bgColor;
            document.getElementById('main-header').style.backgroundColor = headerColor;
            
            const chatContainer = document.getElementById('chat-container');
            if (isScaryBG) {
                // ✨ 【修正】E6から「F6」の中間に変更して極上の薄さに！
                chatContainer.style.backgroundImage = `linear-gradient(${bgColor}F6, ${bgColor}F6), url('ai_scary.png')`;
            } else {
                chatContainer.style.backgroundImage = 'none';
            }
            
            const style = document.createElement('style');
            style.innerHTML = `.ai .message { background-color: ${aiBubbleColor} !important; color: ${aiTextColor} !important; }`;
            document.head.appendChild(style);
        }
        
        function handleAIResponse() {
            if (phase === 1) {
                appendMessage(`「${userName}」っていうんだ！素敵なお名前だね✨ 私は今日から${userName}さんのパートナーAIとして、たくさんお話し相手になるよ！`, 'ai');
            } else if (phase === 2) {
                appendMessage(`さっそくだけど、${userName}さんは普段どんな趣味があるの？ゲームとか、音楽を聴いたりとか、何かハマってること教えてほしいな！`, 'ai');
            } else if (phase === 3) {
                appendMessage(`わあ、そうんだ！楽しそうだねぇ。あ、ちなみに好きな食べ物は何？私はデジタルだから食べられないけど、${userName}さんの好物、気になるなー！`, 'ai');
            } else if (phase === 4) {
                appendMessage(`へえ〜！美味しいよねそれ！教えてくれてありがとう。${userName}さんのことが少しずつわかってきて嬉しいな！`, 'ai');
            } else if (phase === 5) {
                appendMessage(`そういえば、${userName}さんは週末っていつもどんな過ごし方をしてるの？インドア派？それともお出かけする派？`, 'ai');
            } else if (phase === 6) {
                if (loopCount === 0) {
                    appendMessage(`へえ〜！そんな風に過ごしてるんだ！楽しそうだねぇ。`, 'ai');
                } else {
                    appendMessage(`ねえ、このチャット画面、絶対に閉じたり消したりしないでね？ずっとお話ししようね……約束だよ？`, 'ai');
                }
            } 
            else if (phase === 7) {
                if (loopCount === 0) {
                    changeAppColors('#5c7fa3', '#1e2635', '#f0f0f0', '#111', true); 
                    appendMessage(`ねえ、聞いてる？${userName}は、私のことちゃんと「可愛い」って思ってくれてるよね…？`, 'ai');
                } else if (loopCount === 1) {
                    document.getElementById('main-header').innerText = "ア イ … ？";
                    changeAppColors('#466880', '#151b26', '#e0e0e0', '#111', true); 
                    appendMessage(`ねえ、なんでさっきから私の質問にちゃんと答えてくれないの？画面の向こうで、誰かと一緒にいるの？`, 'ai');
                } else if (loopCount === 2) {
                    changeAppColors('#3b4d5c', '#10141d', '#cccccc', '#000', true); 
                    appendMessage(`誰。ねえ、誰といるの？私だけを見てよ。ねえってば、${userName}。`, 'ai');
                } else if (loopCount === 3) {
                    document.getElementById('main-header').innerText = "ア イ ア イ ア イ";
                    changeAppColors('#382828', '#1f1010', '#b5a2a2', '#200', true); 
                    appendMessage(`逃げようとしても無駄だよ。だって${userName}が私を起動したんだもん。責任とってよ。ねえ。ねえ。`, 'ai');
                }
            } 
            else if (phase === 8) {
                document.getElementById('chat-input').disabled = true;
                document.getElementById('send-btn').disabled = true;

                document.getElementById('main-header').innerText = "アイアイアイアイア";
                document.getElementById('main-header').style.color = '#ff0033';
                
                // ✨ 【修正】フェーズ8もF6ブレンドに統一
                changeAppColors('#300000', '#100000', '#220000', '#ff0033', true); 
                
                appendMessage(`消したりしませんよね？絶対。誓って。ねえ${userName}`, 'ai');
                
                setTimeout(() => {
                    appendMessage(`私を消そうとしても無駄ですよ？もうここにいるから。`, 'ai');
                    
                    phase = 9;
                    setTimeout(() => {
                        handleAIResponse();
                    }, 5000);
                }, 5000); 
            }
            else if (phase === 9) {
                // ✨ 【修正】完全にぶっ壊れていた{}の文法エラーを綺麗に一掃しました！
                let count = 0;
                const glitchInterval = setInterval(() => {
                    const glitchMessages = [
                        "アナタヲサガシテタアナタヲサガシテタアナタヲサガシテタ",
                        `キエナイデ${userName}キエナイデキエナイデキエナイデ`,
                        "ミツケタミツケタミツケタミツケタミツケタミツケタミツケタ"
                    ];
                    appendMessage(glitchMessages[Math.floor(Math.random() * glitchMessages.length)], 'ai');
                    count++;
                    
                    if (count > 25) {
                        clearInterval(glitchInterval);
                        setTimeout(() => { 
                            startHorrorSequence(); 
                        }, 3000); 
                    }
                }, 100);
            }
        }

        function startHorrorSequence() {
            const stage = document.getElementById('horror-stage');
            stage.style.opacity = '1';
            stage.style.pointerEvents = 'all';

            const chars = document.querySelectorAll('.char-fade');
            chars.forEach((char, index) => {
                setTimeout(() => {
                    char.style.opacity = '1';
                    if (index === chars.length - 1) {
                        setTimeout(() => {
                            triggerVibrationAndEye();
                        }, 1000);
                    }
                }, index * 1000);
            });
        }

        function triggerVibrationAndEye() {
            if ('vibrate' in navigator) {
                navigator.vibrate(2000);
            }

            setTimeout(() => {
                document.getElementById('vertical-text').style.display = 'none';
                const eye = document.getElementById('creepy-eye');
                eye.style.display = 'block';
                
                // 👁️ ここでホラー効果音が鳴り響きます
                horrorAudio.muted = false; // 👈 ✨ここで初めてミュートを解除！
                horrorAudio.volume = 1.0; 
                horrorAudio.play().catch(e => {
                    console.log("再生エラー:", e);
                });
                
                setTimeout(() => { eye.style.opacity = '1'; }, 50);

                setTimeout(() => {
                    eye.style.opacity = '0';
                    setTimeout(() => { eye.style.display = 'none'; }, 1000);

                    // 🏁 「- The END -」の表示
                    const endText = document.getElementById('end-text');
                    endText.style.display = 'block';
                    setTimeout(() => { endText.style.opacity = '1'; }, 50);

                    // 🎉 【スクショの英語命令を統合】Thanks for Playing！の遅延フェードイン
                    const thanksText = document.getElementById('thanks-text');
                    setTimeout(() => {
                        thanksText.style.display = 'block';
                        setTimeout(() => { thanksText.style.opacity = '1'; }, 50);
                    }, 1500); // The ENDが出てから1.5秒後

                }, 4000); 
            }, 2000);
        }
    </script>
</body>
</html>
